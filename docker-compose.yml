# Yerel gelistirme icin Postgres. (Uretimde Vercel Postgres kullanilir.)
# Baslat: docker compose up -d
# .env -> POSTGRES_URL=postgres://postgres:postgres@localhost:5432/ozden
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ozden
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d ozden']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
